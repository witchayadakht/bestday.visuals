<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Concert - Beatday.visuals</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  background:#111;
  color:white;
}

/* Navbar */
.navbar {
  position: fixed;
  top:0;
  width:100%;
  height:60px;
  background:#000;
  padding:10px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.logo-img {
  height:40px;
  cursor:pointer;
}

/* Menu */
.menu {
  display:flex;
}
.menu a {
  margin-left:15px;
  text-decoration:none;
  color:white;
  font-weight:bold;
  position:relative;
}

/* underline */
.menu a:hover:not(.contact-btn)::after {
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:2px;
  background:white;
}

/* Contact */
.contact-btn {
  border:2px solid white;
  border-radius:20px;
  padding:6px 15px;
}
.contact-btn:hover {
  background:white;
  color:black;
}

/* 🔥 Layout แก้แล้ว */
.gallery {
  display:flex;
  flex-direction:column;
  height:calc(100vh - 60px); /* 🔥 หัก navbar */
  margin-top:60px;
}

/* 🔥 รูปหลัก */
.main-image {
  flex:1;
  min-height:0; /* 🔥 สำคัญ */
  display:flex;
  justify-content:center;
  align-items:center;
}

.main-image img {
  max-width:100%;
  max-height:100%;
  object-fit:contain;
  background:black;
}

/* 🔥 แถบล่าง (ไม่ให้หาย) */
.thumbnail-container {
  flex-shrink:0; /* 🔥 ตัวแก้หลัก */
  height:130px;
  display:flex;
  overflow-x:auto;
  overflow-y:hidden;
  padding:10px;
  background:rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 -10px 30px rgba(0,0,0,0.6);
}

/* scrollbar */
.thumbnail-container::-webkit-scrollbar {
  height:6px;
}
.thumbnail-container::-webkit-scrollbar-thumb {
  background:#555;
  border-radius:10px;
}

/* รูปเล็ก */
.thumbnail {
  width:150px;
  height:100%;
  object-fit:cover;
  margin-right:10px;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

.thumbnail:hover {
  transform:scale(1.1);
}

/* 📱 มือถือ */
@media(max-width:768px){
  .thumbnail {
    width:110px;
  }
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <div onclick="window.location.href='home.html'">
    <img src="asset/logo.png" class="logo-img">
  </div>
  <div class="menu">
    <a href="concert.html">Concert</a>
    <a href="edm.html">EDM</a>
    <a href="home.html#footer" class="contact-btn">Contact</a>
  </div>
</div>

<!-- Gallery -->
<div class="gallery">

  <!-- รูปใหญ่ -->
  <div class="main-image">
    <img id="mainImage" src="asset/Concert/BESETER_Concert_1.jpg">
  </div>

  <!-- แถบรูป -->
  <div class="thumbnail-container" id="slider"></div>

</div>

<script>
const totalImages = 210;

const slider = document.getElementById("slider");
const mainImage = document.getElementById("mainImage");

// 🔥 โหลดรูปอัตโนมัติ
for(let i = 1; i <= totalImages; i++){
  const img = document.createElement("img");
  img.src = `asset/Concert/BESETER_Concert_${i}.jpg`;
  img.className = "thumbnail";

  img.onerror = function(){
    this.style.display = "none";
  };

  img.onclick = function(){
    mainImage.src = this.src;
  };

  slider.appendChild(img);
}

// 🔥 ใช้ลูกกลิ้งเมาส์เลื่อนแนวนอน
slider.addEventListener("wheel", function(e){
  e.preventDefault();
  slider.scrollLeft += e.deltaY;
});
</script>

</body>
</html>
